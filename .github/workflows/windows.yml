name: RDP1

on:
  workflow_dispatch:

jobs:
  rdp-job:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:

      # =================================
      # 1️⃣ BASIC SETUP
      # =================================

      - name: Enable Script Execution
        run: Set-ExecutionPolicy Bypass -Scope Process -Force

      - name: Enable RDP
        run: |
          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" `
            -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Restart-Service TermService -Force

      - name: Create RDP User
        run: |
          $password = ConvertTo-SecureString "@Whatsapp2" -AsPlainText -Force
          New-LocalUser -Name "dolvin" -Password $password -AccountNeverExpires -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member "dolvin"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "dolvin"

          echo "RDP_USER=dolvin" >> $env:GITHUB_ENV
          echo "RDP_PASS=@Whatsapp2" >> $env:GITHUB_ENV


      # =================================
      # 2️⃣ TAILSCALE
      # =================================

      - name: Install Tailscale
        run: |
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi `
            -OutFile "$env:TEMP\tailscale.msi"
          Start-Process msiexec.exe `
            -ArgumentList "/i $env:TEMP\tailscale.msi /quiet /norestart" `
            -Wait

      - name: Start Tailscale
        run: Start-Service Tailscale

      - name: Connect Tailscale
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
            --hostname=gh-runner-${{ github.run_id }} `
            --accept-routes `
            --accept-dns=false `
            --reset

          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "TS_IP=$ip" >> $env:GITHUB_ENV

      - name: Wait Network Ready
        run: Start-Sleep -Seconds 5


      # =================================
      # 3️⃣ INSTALL DEPENDENCY
      # =================================

      - name: Install VC++
        run: |
          Invoke-WebRequest https://aka.ms/vs/17/release/vc_redist.x64.exe `
            -OutFile "$env:TEMP\vc.exe"
          Start-Process "$env:TEMP\vc.exe" `
            -ArgumentList "/install /quiet /norestart" `
            -Wait

      - name: Install aria2
        run: choco install aria2 -y


      # =================================
      # 4️⃣ DOWNLOAD & INSTALL LAUNCHER
      # =================================

      - name: Download bahn.zip
        run: |
          aria2c -x 8 -s 8 `
          "https://drive.usercontent.google.com/download?id=1YLPDhH0-fgaXihTshYgDCYFQ0c1CFbZp&export=download&confirm=t" `
          -d "$env:TEMP" `
          -o "bahn.zip"

      - name: Extract bahn
        run: |
          Remove-Item -Recurse -Force "C:\bahn" -ErrorAction SilentlyContinue
          Expand-Archive -Path "$env:TEMP\bahn.zip" -DestinationPath "C:\" -Force
          Remove-Item "$env:TEMP\bahn.zip" -Force

      - name: Install Launcher
        run: |
          $installer = "C:\bahn\bahn\Install_POINTBLANK_20251111.exe"
          if (Test-Path $installer) {
              Start-Process $installer -ArgumentList "/S" -Wait
          }


      # =================================
      # 5️⃣ DOWNLOAD GAME DATA
      # =================================

      - name: Download PointBlank ID.zip
        run: |
          aria2c -x 16 -s 16 `
          "https://drive.usercontent.google.com/download?id=1mLMBZfpndqcdC_CtKkonwHlFD6gJlNM0&export=download&confirm=t" `
          -d "$env:TEMP" `
          -o "PB_GAME.zip"

      - name: Validate Game Zip
        run: |
          $size = (Get-Item "$env:TEMP\PB_GAME.zip").Length
          if ($size -lt 100000000) {
              Write-Host "File tidak valid / terlalu kecil!"
              exit 1
          }

      - name: Extract Game Data
        run: |
          Expand-Archive -Path "$env:TEMP\PB_GAME.zip" -DestinationPath "C:\Zepetto" -Force
          Remove-Item "$env:TEMP\PB_GAME.zip" -Force


      # =================================
      # 6️⃣ TWEAKS (SETELAH SEMUA DOWNLOAD)
      # =================================

      - name: SUPER OPTIMIZATION
        run: |
          powercfg -setactive SCHEME_MIN
          powercfg -hibernate off
          powercfg -change -monitor-timeout-ac 0
          powercfg -change -standby-timeout-ac 0

          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue

          Stop-Service DiagTrack -Force -ErrorAction SilentlyContinue
          Set-Service DiagTrack -StartupType Disabled -ErrorAction SilentlyContinue

          $services = @("SysMain","WSearch","MapsBroker","Fax","Spooler","RemoteRegistry","WerSvc")
          foreach ($svc in $services) {
            Stop-Service $svc -Force -ErrorAction SilentlyContinue
            Set-Service $svc -StartupType Disabled -ErrorAction SilentlyContinue
          }

          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" /v VisualFXSetting /t REG_DWORD /d 2 /f
          fsutil behavior set disablelastaccess 1


      # =================================
      # INFO & KEEP ALIVE
      # =================================

      - name: Show Info
        run: |
          Write-Host ""
          Write-Host "=============================="
          Write-Host "RDP READY"
          Write-Host "IP   : $env:TS_IP"
          Write-Host "USER : $env:RDP_USER"
          Write-Host "PASS : $env:RDP_PASS"
          Write-Host "=============================="
          Write-Host ""

      - name: Keep Alive
        run: |
          while ($true) {
            Write-Host "RDP Active..."
            Start-Sleep -Seconds 300
          }
