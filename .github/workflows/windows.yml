name: RDP1

on:
  workflow_dispatch:

jobs:
  rdp-job:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:

      - name: Enable Script Execution
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force


      - name: Enable RDP
        run: |
          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" `
            -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Restart-Service TermService -Force


      - name: Create RDP User
        run: |
          $password = ConvertTo-SecureString "@Whatsapp2" -AsPlainText -Force

          New-LocalUser `
            -Name "dolvin" `
            -Password $password `
            -AccountNeverExpires `
            -ErrorAction SilentlyContinue

          Add-LocalGroupMember -Group "Administrators" -Member "dolvin" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "dolvin" -ErrorAction SilentlyContinue

          echo "RDP_USER=dolvin" >> $env:GITHUB_ENV
          echo "RDP_PASS=@Whatsapp2" >> $env:GITHUB_ENV


      # === LIGHT OPTIMIZATION (AMAN BUAT LAUNCHER) ===
      - name: Basic Performance Tweaks
        run: |
          powercfg -setactive SCHEME_MIN
          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" /v VisualFXSetting /t REG_DWORD /d 2 /f


      # === INSTALL DEPENDENCY ===
      - name: Install VC++
        run: |
          Invoke-WebRequest `
            https://aka.ms/vs/17/release/vc_redist.x64.exe `
            -OutFile "$env:TEMP\vc.exe"

          Start-Process "$env:TEMP\vc.exe" `
            -ArgumentList "/install /quiet /norestart" `
            -Wait


      - name: Install gdown
        run: |
          python -m pip install gdown


      # === DOWNLOAD LAUNCHER FILE (bahn.zip) ===
      - name: Download bahn.zip
        run: |
          $output = "$env:TEMP\bahn.zip"
          python -m gdown 1YLPDhH0-fgaXihTshYgDCYFQ0c1CFbZp -O $output
          echo "BAHN_ZIP=$output" >> $env:GITHUB_ENV


      - name: Extract bahn
        run: |
          Expand-Archive -Path $env:BAHN_ZIP -DestinationPath "C:\" -Force


      # === DOWNLOAD FULL PB DARI DRIVE ===
      - name: Download Zepetto.zip
        run: |
          $output = "$env:TEMP\Zepetto.zip"
          python -m gdown 15nbK38wiib_vCiA0SY4l_NVHeADAUGPO -O $output
          echo "PB_ZIP=$output" >> $env:GITHUB_ENV


      - name: Clean Old Zepetto
        run: |
          Remove-Item -Recurse -Force "C:\Zepetto" -ErrorAction SilentlyContinue


      - name: Extract PB to C:\
        run: |
          Expand-Archive -Path $env:PB_ZIP -DestinationPath "C:\" -Force


      # === FIX NESTED FOLDER AUTO ===
      - name: Fix Nested Folder
        run: |
          if (Test-Path "C:\Zepetto\Zepetto") {
            Move-Item "C:\Zepetto\Zepetto\*" "C:\Zepetto\" -Force
            Remove-Item "C:\Zepetto\Zepetto" -Recurse -Force
          }


      # === INSTALL LAUNCHER ===
      - name: Install PointBlank Launcher
        run: |
          $installer = "C:\bahn\bahn\Install_POINTBLANK_20251111.exe"

          if (Test-Path $installer) {
              Start-Process $installer -ArgumentList "/S" -Wait
          } else {
              Write-Host "Installer tidak ditemukan!"
          }


      - name: Open Launcher
        run: |
          Start-Process "C:\Zepetto\Z-Launcher(ID)\ZLauncher.exe"


      - name: Show RDP Info
        run: |
          Write-Host ""
          Write-Host "=============================="
          Write-Host "RDP READY"
          Write-Host "USER : $env:RDP_USER"
          Write-Host "PASS : $env:RDP_PASS"
          Write-Host "=============================="
          Write-Host ""


      - name: Keep Alive
        run: |
          while ($true) {
            Write-Host "RDP Active..."
            Start-Sleep -Seconds 300
          }
