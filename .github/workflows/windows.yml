name: RDP1

on:
  workflow_dispatch:

jobs:
  rdp-job:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

      # Enable PowerShell execution
      - name: Enable Script Execution
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force


      # Enable RDP
      - name: Enable RDP
        run: |
          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" `
            -Value 0

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          Restart-Service TermService -Force


      # Create RDP User
      - name: Create RDP User
        run: |
          $password = ConvertTo-SecureString "@Whatsapp2" -AsPlainText -Force

          New-LocalUser `
            -Name "dolvin" `
            -Password $password `
            -AccountNeverExpires `
            -ErrorAction SilentlyContinue

          Add-LocalGroupMember -Group "Administrators" -Member "dolvin" -ErrorAction SilentlyContinue

          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "dolvin" -ErrorAction SilentlyContinue

          echo "RDP_USER=dolvin" >> $env:GITHUB_ENV
          echo "RDP_PASS=@Whatsapp2" >> $env:GITHUB_ENV


      # Custom Tweaks (FULL OPTIMIZATION)
      - name: Custom Performance Tweaks
        shell: powershell
        run: |

          Write-Host "Applying Ultimate Optimization..."

          # POWER PLAN
          powercfg -setactive SCHEME_MIN
          powercfg -change -standby-timeout-ac 0
          powercfg -change -monitor-timeout-ac 0
          powercfg -hibernate off

          # DEFENDER OFF
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue

          Stop-Service WinDefend -Force -ErrorAction SilentlyContinue
          Set-Service WinDefend -StartupType Disabled -ErrorAction SilentlyContinue

          # TELEMETRY OFF
          Stop-Service DiagTrack -Force -ErrorAction SilentlyContinue
          Set-Service DiagTrack -StartupType Disabled -ErrorAction SilentlyContinue

          reg add "HKLM\SOFTWARE\Policies\Microsoft\Windows\DataCollection" /v AllowTelemetry /t REG_DWORD /d 0 /f

          # SERVICES OFF
          $services = @(
            "SysMain",
            "WSearch",
            "dmwappushservice",
            "WerSvc",
            "Fax",
            "MapsBroker",
            "RemoteRegistry",
            "Spooler"
          )

          foreach ($svc in $services) {
            Stop-Service $svc -Force -ErrorAction SilentlyContinue
            Set-Service $svc -StartupType Disabled -ErrorAction SilentlyContinue
          }

          # VISUAL OFF
          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" /v VisualFXSetting /t REG_DWORD /d 2 /f

          reg add "HKCU\Control Panel\Desktop" /v MenuShowDelay /t REG_SZ /d 0 /f
          reg add "HKCU\Control Panel\Desktop" /v DragFullWindows /t REG_SZ /d 0 /f

          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize" /v EnableTransparency /t REG_DWORD /d 0 /f

          # NETWORK BOOST
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile" `
            /v NetworkThrottlingIndex /t REG_DWORD /d 4294967295 /f

          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile" `
            /v SystemResponsiveness /t REG_DWORD /d 0 /f

          # CPU BOOST
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\PriorityControl" `
            /v Win32PrioritySeparation /t REG_DWORD /d 38 /f

          # EDGE OFF
          reg add "HKLM\SOFTWARE\Policies\Microsoft\Edge" `
            /v StartupBoostEnabled /t REG_DWORD /d 0 /f

          reg add "HKLM\SOFTWARE\Policies\Microsoft\Edge" `
            /v BackgroundModeEnabled /t REG_DWORD /d 0 /f

          # BACKGROUND APPS OFF
          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\BackgroundAccessApplications" `
            /v GlobalUserDisabled /t REG_DWORD /d 1 /f

          # REMOVE BLOAT
          Get-AppxPackage *Xbox* | Remove-AppxPackage -ErrorAction SilentlyContinue
          Get-AppxPackage *Teams* | Remove-AppxPackage -ErrorAction SilentlyContinue
          Get-AppxPackage *Clipchamp* | Remove-AppxPackage -ErrorAction SilentlyContinue
          Get-AppxPackage *GetHelp* | Remove-AppxPackage -ErrorAction SilentlyContinue

          # RESTART EXPLORER
          Stop-Process -Name explorer -Force -ErrorAction SilentlyContinue
          Start-Process explorer

          Write-Host "Optimization DONE"


      # Optimize RDP Smoothness
      - name: Optimize RDP Performance
        run: |
          reg add "HKCU\Control Panel\Desktop" /v DragFullWindows /t REG_SZ /d 0 /f
          reg add "HKCU\Control Panel\Desktop" /v MenuShowDelay /t REG_SZ /d 0 /f
          reg add "HKCU\Control Panel\Desktop" /v FontSmoothing /t REG_SZ /d 0 /f

          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced" `
            /v TaskbarAnimations /t REG_DWORD /d 0 /f


      # Install Tailscale
      - name: Install Tailscale
        run: |
          Invoke-WebRequest `
            https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi `
            -OutFile "$env:TEMP\tailscale.msi"

          Start-Process msiexec.exe `
            -ArgumentList "/i $env:TEMP\tailscale.msi /quiet /norestart" `
            -Wait


      # Start Tailscale Service
      - name: Start Tailscale Service
        run: |
          Start-Service Tailscale


      # Connect Tailscale Authkey
      - name: Connect Tailscale
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
            --hostname=gh-runner-${{ github.run_id }} `
            --accept-routes `
            --accept-dns=false `
            --reset

          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4

          echo "TS_IP=$ip" >> $env:GITHUB_ENV


      # Install VC++
      - name: Install VC++
        run: |
          Invoke-WebRequest `
            https://aka.ms/vs/17/release/vc_redist.x64.exe `
            -OutFile "$env:TEMP\vc.exe"

          Start-Process `
            "$env:TEMP\vc.exe" `
            -ArgumentList "/install /quiet /norestart" `
            -Wait


      - name: Install gdown
        run: |
          python -m pip install gdown


      - name: Download ZIP from Google Drive
        run: |
          $output = "C:\bahn.zip"

          python -m gdown 1YLPDhH0-fgaXihTshYgDCYFQ0c1CFbZp `
            -O $output

          if (Test-Path $output) {
            Write-Host "Download SUCCESS"
            Get-Item $output | Format-List Name,Length
          } else {
            Write-Host "Download FAILED" 
          }


      - name: Extract bahn
        run: |
          Expand-Archive -Path "C:\bahn.zip" -DestinationPath "C:\bahn" -Force


      # Show Info
      - name: Show RDP Info
        run: |
          Write-Host ""
          Write-Host "=============================="
          Write-Host "RDP READY"
          Write-Host "IP   : $env:TS_IP"
          Write-Host "USER : $env:RDP_USER"
          Write-Host "PASS : $env:RDP_PASS"
          Write-Host "PB   : Desktop\\PointBlank"
          Write-Host "=============================="
          Write-Host ""


      # Keep Alive
      - name: Keep Alive
        run: |
          while ($true) {
            Write-Host "RDP Active..."
            Start-Sleep -Seconds 300
          }
