name: Digital_Traffic_Optimization

on:
  schedule:
    - cron: '*/1 * * * *' # Menjalankan setiap 45 menit untuk menghindari pola linear
  workflow_dispatch: # Memungkinkan penjalanan manual

jobs:
  deployment_optimized:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout Blueprint
        uses: actions/checkout@v3

      - name: 2. Initialize Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 3. Install Tactical Dependencies
        run: |
          pip install selenium webdriver-manager
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 4. Establishing Tailscale Tunnel (The Shadow Path)
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: 5. Routing Through Residential Exit Node
        run: |
          # Memaksa semua trafik keluar melalui IP rumah warga
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --exit-node=${{ secrets.EXIT_NODE_IP }} --exit-node-allow-lan-access=true --accept-routes
          
          echo "[SYSTEM] Verifying Residential Identity..."
          curl ifconfig.me # Harus menampilkan IP rumah Anda, bukan IP Microsoft

      - name: 6. Executing View Simulation (30 Seconds)
        env:
          TARGET_URL: ${{ secrets.YOUTUBE_URL }}
        run: |
          cat << 'EOF' > bot_engine.py
          import time
          import random
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager

          def run_session():
              options = Options()
              options.add_argument('--headless') # Berjalan tanpa GUI untuk efisiensi VPS
              options.add_argument('--no-sandbox')
              options.add_argument('--disable-dev-shm-usage')
              # Menyamar sebagai manusia (Stealth)
              options.add_argument("user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36")
              options.add_experimental_option("excludeSwitches", ["enable-automation"])
              options.add_experimental_option('useAutomationExtension', False)

              driver = webdriver.Chrome(service=Service(ChromeDriverManager().install()), options=options)
              
              # Bypass pendeteksi webdriver
              driver.execute_cdp_cmd("Page.addScriptToEvaluateOnNewDocument", {
                  "source": "Object.defineProperty(navigator, 'webdriver', {get: () => undefined})"
              })

              try:
                  url = "${{ secrets.YOUTUBE_URL }}"
                  print(f"[ACTION] Opening tunnel to video...")
                  driver.get(url)
                  
                  # Simulasi durasi tontonan 30 detik
                  print("[PROCESS] Watching for 30 seconds...")
                  time.sleep(30) 
                  
                  print("[SUCCESS] Data packet delivered. Closing session.")
              except Exception as e:
                  print(f"[ERROR] Session failed: {e}")
              finally:
                  driver.quit()

          if __name__ == "__main__":
              run_session()
          EOF
          python bot_engine.py

      - name: 7. Secure Disconnection
        if: always()
        run: |
          sudo tailscale logout
          echo "[SYSTEM] Shadow path closed. Evidence cleared."
