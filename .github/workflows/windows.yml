name: RDP1

on:
  workflow_dispatch:

jobs:
  rdp-job:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:

      - name: Enable Script Execution
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force


      - name: Enable RDP
        run: |
          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" `
            -Value 0

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Restart-Service TermService -Force


      - name: Create RDP User
        run: |
          $password = ConvertTo-SecureString "@Whatsapp2" -AsPlainText -Force

          New-LocalUser `
            -Name "dolvin" `
            -Password $password `
            -AccountNeverExpires `
            -ErrorAction SilentlyContinue

          Add-LocalGroupMember -Group "Administrators" -Member "dolvin" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "dolvin" -ErrorAction SilentlyContinue

          echo "RDP_USER=dolvin" >> $env:GITHUB_ENV
          echo "RDP_PASS=@Whatsapp2" >> $env:GITHUB_ENV


      - name: SUPER ULTIMATE OPTIMIZATION
        shell: powershell
        run: |

          Write-Host "==== SUPER ULTIMATE MODE START ===="

          # MAX POWER
          powercfg -setactive SCHEME_MIN
          powercfg -hibernate off
          powercfg -change -monitor-timeout-ac 0
          powercfg -change -standby-timeout-ac 0

          # DEFENDER OFF
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          Stop-Service WinDefend -Force -ErrorAction SilentlyContinue
          Set-Service WinDefend -StartupType Disabled -ErrorAction SilentlyContinue

          # KILL UPDATE STACK
          $update = @("wuauserv","UsoSvc","DoSvc","BITS","TrustedInstaller")
          foreach ($svc in $update) {
            Stop-Service $svc -Force -ErrorAction SilentlyContinue
            Set-Service $svc -StartupType Disabled -ErrorAction SilentlyContinue
          }

          # DISABLE TELEMETRY
          Stop-Service DiagTrack -Force -ErrorAction SilentlyContinue
          Set-Service DiagTrack -StartupType Disabled -ErrorAction SilentlyContinue
          reg add "HKLM\SOFTWARE\Policies\Microsoft\Windows\DataCollection" /v AllowTelemetry /t REG_DWORD /d 0 /f

          # DISABLE EXTRA SERVICES
          $extra = @("SysMain","WSearch","MapsBroker","Fax","Spooler","RemoteRegistry","WerSvc","Themes")
          foreach ($svc in $extra) {
            Stop-Service $svc -Force -ErrorAction SilentlyContinue
            Set-Service $svc -StartupType Disabled -ErrorAction SilentlyContinue
          }

          # DISABLE ERROR REPORT
          reg add "HKLM\SOFTWARE\Microsoft\Windows\Windows Error Reporting" /v Disabled /t REG_DWORD /d 1 /f

          # VISUAL OFF
          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" /v VisualFXSetting /t REG_DWORD /d 2 /f
          reg add "HKCU\Control Panel\Desktop" /v MenuShowDelay /t REG_SZ /d 0 /f
          reg add "HKCU\Control Panel\Desktop" /v DragFullWindows /t REG_SZ /d 0 /f
          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize" /v EnableTransparency /t REG_DWORD /d 0 /f

          # NTFS BOOST
          fsutil behavior set disablelastaccess 1
          fsutil behavior set memoryusage 2

          # NETWORK BOOST
          netsh int tcp set global autotuninglevel=disabled
          netsh int tcp set global rss=enabled
          netsh int tcp set global chimney=enabled

          # CPU PRIORITY
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\PriorityControl" /v Win32PrioritySeparation /t REG_DWORD /d 38 /f

          # KILL EDGE & ONEDRIVE
          Get-Process -Name OneDrive -ErrorAction SilentlyContinue | Stop-Process -Force
          Get-Process -Name MicrosoftEdge* -ErrorAction SilentlyContinue | Stop-Process -Force

          Write-Host "==== SUPER ULTIMATE MODE ACTIVE ===="


      - name: Install Tailscale
        run: |
          Invoke-WebRequest `
            https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi `
            -OutFile "$env:TEMP\tailscale.msi"

          Start-Process msiexec.exe `
            -ArgumentList "/i $env:TEMP\tailscale.msi /quiet /norestart" `
            -Wait


      - name: Start Tailscale Service
        run: |
          Start-Service Tailscale


      - name: Connect Tailscale
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
            --hostname=gh-runner-${{ github.run_id }} `
            --accept-routes `
            --accept-dns=false `
            --reset

          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "TS_IP=$ip" >> $env:GITHUB_ENV


      - name: Install VC++
        run: |
          Invoke-WebRequest `
            https://aka.ms/vs/17/release/vc_redist.x64.exe `
            -OutFile "$env:TEMP\vc.exe"

          Start-Process "$env:TEMP\vc.exe" `
            -ArgumentList "/install /quiet /norestart" `
            -Wait


      - name: Install gdown
        run: |
          python -m pip install gdown


      - name: Download ZIP (RAM MODE)
        run: |
          $output = "$env:TEMP\bahn.zip"
          python -m gdown 1YLPDhH0-fgaXihTshYgDCYFQ0c1CFbZp -O $output
          echo "ZIP_PATH=$output" >> $env:GITHUB_ENV


      - name: Extract FAST (RAM → DISK)
        run: |
          Expand-Archive -Path $env:ZIP_PATH -DestinationPath "$env:TEMP\bahn" -Force
          Move-Item "$env:TEMP\bahn" "C:\bahn" -Force

      - name: Install PointBlank Launcher
        shell: powershell
        run: |

          $installer = "C:\bahn\bahn\Install_POINTBLANK_20251111.exe"

          if (Test-Path $installer) {

              Write-Host "Installer ditemukan. Mulai install..."

              Start-Process $installer `
                -ArgumentList "/S" `
                -Wait

              Write-Host "Install selesai."

          } else {

              Write-Host "Installer tidak ditemukan!"
          }

      


      - name: Auto Start PB Download
        shell: powershell
        run: |

         $launcher = "C:\Program Files\Zepetto\PointBlank\PointBlankLauncher.exe"

         if (Test-Path $launcher) {

          Start-Process $launcher
           Start-Sleep -Seconds 15   # tunggu launcher kebuka

          Add-Type -AssemblyName System.Windows.Forms

                # Pastikan launcher fokus
              [System.Windows.Forms.SendKeys]::SendWait("{TAB}")
                Start-Sleep -Milliseconds 500

                    # Tekan ENTER (asumsi tombol INSTALL kepilih)
                 [System.Windows.Forms.SendKeys]::SendWait("{ENTER}")

                Write-Host "Download trigger dikirim."
                }


      - name: Show RDP Info
        run: |
          Write-Host ""
          Write-Host "=============================="
          Write-Host "RDP READY"
          Write-Host "IP   : $env:TS_IP"
          Write-Host "USER : $env:RDP_USER"
          Write-Host "PASS : $env:RDP_PASS"
          Write-Host "=============================="
          Write-Host ""


      - name: Keep Alive
        run: |
          while ($true) {
            Write-Host "RDP Active..."
            Start-Sleep -Seconds 300
          }
