name: Streaming Engine

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 347
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Download Video from Dropbox
        run: |
          # wget jauh lebih cepat dan simpel untuk link direct Dropbox
          wget -O lofi2.mp4 "https://www.dropbox.com/scl/fi/ga51lj11h87fj932orbby/lofi2.mp4?rlkey=96hs5ggnp3dvh7k1wh69ju086&st=klbvmzyn&dl=1"

      - name: Start Looping Stream
        run: |
          ffmpeg -re -stream_loop -1 -i lofi2.mp4 \
          -c:v libx264 -preset veryfast -b:v 6000k -maxrate 6800k -bufsize 12000k \
          -pix_fmt yuv420p -g 120 -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAMM_KEY }}"
