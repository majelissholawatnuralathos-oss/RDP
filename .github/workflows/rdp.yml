name: Headless CLI + Tailscale SSH

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      USERNAME: "dolvin"
      PASSWORD: "whatsapp2"
      TALESCALE_AUTH_KEY: ${{ secrets.TALESCALE_AUTH_KEY }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Create User & SSH Config
        run: |
          # Buat user buat lu login
          sudo useradd -m -s /bin/bash "$USERNAME" || true
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo "$USERNAME" || true
          
          # Pastikan SSH service jalan
          sudo systemctl start ssh

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Start Tailscale (CLI Mode)
        run: |
          # WAJIB: Pakai userspace-networking karena GitHub Runner gak kasih akses TUN
          sudo tailscaled --tun=userspace-networking --socks5-server=localhost:1055 & 
          sleep 5
          
          # Login Tailscale + Aktifkan Tailscale SSH biar lu gampang masuknya
          sudo tailscale up \
            --authkey="${TALESCALE_AUTH_KEY}" \
            --hostname=gh-runner-${{ github.run_id }} \
            --ssh \
            --accept-routes

      - name: Show Connection Info
        run: |
          echo "=========================================="
          echo "Runner is READY!"
          echo "Tailscale IP: $(tailscale ip -4)"
          echo "SSH via Tailscale: ssh $USERNAME@$(tailscale ip -4)"
          echo "=========================================="

      - name: Keep Alive
        run: |
          # Loop biar gak mati selama 6 jam
          while true; do
            echo "Runner still running... $(date)"
            sleep 300
          done
