name: RDP Windows Tailscale

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tailscale on Windows
        shell: pwsh
        run: |
          echo "Downloading Tailscale..."
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "tailscale-setup.exe"
          
          echo "Installing Tailscale..."
          Start-Process -FilePath ".\tailscale-setup.exe" -ArgumentList "/quiet" -Wait
          
          echo "Connecting to Tailscale..."
          # Gunakan OAuth Secret kamu di sini
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TS_CLIENT_SECRET }} --hostname=github-windows-runner --accept-routes
          
          echo "Tailscale Connected!"

      - name: Nonton via PowerShell Chrome
        shell: pwsh
        run: |
          $url = "https://www.youtube.com/watch?v=Tt9uSpzDCZ0"
          
          echo "Membuka Chrome untuk streaming..."
          $process = Start-Process "chrome.exe" -ArgumentList @(
            "--headless",
            "--disable-gpu",
            "--autoplay-policy=no-user-gesture-required",
            "--no-first-run",
            $url
          ) -PassThru
          
          echo "Menonton selama 90 detik beneran lewat Tailscale..."
          Start-Sleep -Seconds 90
          
          echo "Durasi 1.30 menit selesai. Menutup Chrome."
          Stop-Process -Id $process.Id -Force
