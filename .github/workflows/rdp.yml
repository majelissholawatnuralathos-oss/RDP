name: RDP

on: 
  workflow_dispatch: # Biar bisa kamu jalankan manual kapan saja

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_CLIENT_SECRET }}
          tags: tag:ci # Pastikan kamu sudah buat tag ini di Tailscale ACL
          
      - name: Nonton Beneran via Playwright
        run: |
          # 1. Install library Playwright-nya dulu
          npm install playwright
          
          # 2. Install browser Chromium (beserta dependensi sistemnya)
          npx playwright install chromium --with-deps
          
          # 3. Jalankan script nontonnya
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            try {
              const browser = await chromium.launch({ headless: true });
              const page = await browser.newPage();
              
              // Set User-Agent biar gak dikira bot amatir
              await page.setExtraHTTPHeaders({ 
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36' 
              });
              
              console.log('Membuka video YouTube...');
              await page.goto('https://www.youtube.com/watch?v=Tt9uSpzDCZ0', { waitUntil: 'networkidle' });
              
              // Klik play jika perlu (opsional, biasanya auto-play)
              try { await page.click('.ytp-play-button', { timeout: 5000 }); } catch (e) {}

              console.log('Menonton selama 90 detik...');
              await new Promise(resolve => setTimeout(resolve, 90000)); 
              
              console.log('Selesai pancing traffic 1.30 menit dari Ciputat.');
              await browser.close();
            } catch (err) {
              console.error('Ada masalah:', err);
              process.exit(1);
            }
          })();
          "
            await page.waitForTimeout(90000); 
            
            console.log('Selesai pancing traffic dari Ciputat.');
            await browser.close();
          })();
          "
