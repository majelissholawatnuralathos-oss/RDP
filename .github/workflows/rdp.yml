name: RDP

on: 
  workflow_dispatch: # Biar bisa kamu jalankan manual kapan saja

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }} # Pastikan secret ini sudah kamu isi di setting repo

      - name: Nonton Kilat via Tailscale
        run: |
          # Mengakses live stream selama 90 detik (1.30 menit)
          # Menggunakan User-Agent Chrome terbaru agar terdeteksi organik
          timeout 90s curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
          "https://www.youtube.com/watch?v=Tt9uSpzDCZ0" || true
          
          echo "Selesai memberikan pancingan traffic 1.30 menit dari Ciputat."
