name: RDP Windows Tailscale

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install & Connect Tailscale
        shell: pwsh
        run: |
          echo "Downloading Tailscale..."
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "tailscale-setup.exe"
          
          echo "Installing Tailscale..."
          Start-Process -FilePath ".\tailscale-setup.exe" -ArgumentList "/quiet" -Wait
          
          echo "Starting Tailscale Service..."
          # Pastikan service tailscale jalan di Windows
          Start-Service -Name "Tailscale" -ErrorAction SilentlyContinue
          
          echo "Connecting with Auth Key..."
          # Menggunakan Auth Key dan wajib menyertakan tag jika key tersebut didefinisikan sebagai tag-owner
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-windows-runner --accept-routes --advertise-tags=tag:ci
          
          echo "Status Tailscale:"
          & "C:\Program Files\Tailscale\tailscale.exe" status

      - name: Nonton via PowerShell Chrome
        shell: pwsh
        run: |
          $url = "https://www.youtube.com/watch?v=Tt9uSpzDCZ0"
          
          echo "Membuka Chrome (Headless)..."
          $process = Start-Process "chrome.exe" -ArgumentList @(
            "--headless",
            "--disable-gpu",
            "--autoplay-policy=no-user-gesture-required",
            "--no-first-run",
            $url
          ) -PassThru
          
          echo "Menonton streaming selama 90 detik..."
          Start-Sleep -Seconds 90
          
          echo "Selesai 1.30 menit. Menutup proses Chrome."
          Stop-Process -Id $process.Id -Force
          echo "Eksekusi dari Ciputat selesai."
