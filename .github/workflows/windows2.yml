name: RDP2

on:
  workflow_dispatch:

jobs:
  rdp-job:
    runs-on: windows-2025-vs2026
    timeout-minutes: 360

    steps:

      # Enable PowerShell script execution
      - name: Enable Script Execution
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force

      # Enable RDP
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Restart-Service TermService -Force

      # Create RDP User
      - name: Create RDP User
        run: |
          $password = ConvertTo-SecureString "@Whatsapp2" -AsPlainText -Force

          New-LocalUser -Name "dolvin" `
            -Password $password `
            -AccountNeverExpires `
            -ErrorAction SilentlyContinue

          Add-LocalGroupMember -Group "Administrators" -Member "dolvin" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "dolvin" -ErrorAction SilentlyContinue

          echo "RDP_USER=dolvin" >> $env:GITHUB_ENV
          echo "RDP_PASS=@Whatsapp2" >> $env:GITHUB_ENV


      # Safety: Re-enable RDP
      - name: Re-enable RDP Safety
        run: |
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Restart-Service TermService -Force

      # Install Tailscale
      - name: Install Tailscale
        run: |
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $out = "$env:TEMP\tailscale.msi"

          Invoke-WebRequest -Uri $url -OutFile $out

          Start-Process msiexec.exe `
            -ArgumentList "/i $out /quiet /norestart" `
            -Wait

      # Connect Tailscale using Authkey
      - name: Connect Tailscale
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
            --hostname=gh-runner-${{ github.run_id }} `
            --accept-routes `
            --accept-dns=false

          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4

          echo "TS_IP=$ip" >> $env:GITHUB_ENV

   

     

      # Show RDP Info
      - name: Show Connection Info
        run: |
          Write-Host ""
          Write-Host "=============================="
          Write-Host "RDP READY"
          Write-Host "IP       : $env:TS_IP"
          Write-Host "USER     : $env:RDP_USER"
          Write-Host "PASS     : $env:RDP_PASS"
          Write-Host "=============================="

      # Step Baru: Buka Chrome & Nonton YouTube Otomatis
      - name: Auto Open YouTube for Dolvin
        run: |
          $Url = "https://www.youtube.com/watch?v=Tt9uSpzDCZ0"
          $User = "dolvin"
          
          # Kita buat perintah untuk dijalankan saat user login (via Scheduled Task)
          # Biar pas kamu konek RDP, Chrome sudah terbuka di layar dolvin
          $Action = New-ScheduledTaskAction -Execute "C:\Program Files\Google\Chrome\Application\chrome.exe" `
                    -Argument "--start-maximized --no-first-run --autoplay-policy=no-user-gesture-required $Url"
          $Trigger = New-ScheduledTaskTrigger -AtLogOn -User $User
          $Principal = New-ScheduledTaskPrincipal -UserId $User -LogonType Interactive
          
          Register-ScheduledTask -TaskName "AutoWatchYT" -Action $Action -Trigger $Trigger -Principal $Principal -Force
          
          # Jalankan sekarang juga di background
          Start-ScheduledTask -TaskName "AutoWatchYT"
          Write-Host "Chrome dijadwalkan buka untuk user $User."

      # Keep Alive
      - name: Keep Alive
        run: |
          while ($true) {
            # Cek apakah Chrome masih jalan (biar nggak mati)
            if (!(Get-Process chrome -ErrorAction SilentlyContinue)) {
               Write-Host "[$(Get-Date)] Chrome mati, mencoba buka ulang..."
               Start-ScheduledTask -TaskName "AutoWatchYT"
            }
            Start-Sleep -Seconds 300
          }
